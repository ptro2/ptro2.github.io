<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Árbol de Flores</title>
<style>
  /* ============================================
     CONFIGURACIÓN — edita aquí tus mensajes
     ============================================ */

  /*
    INSTRUCCIONES:
    - MAX_FLORES: número máximo de flores que pueden caer (se define en JS abajo)
    - MENSAJES: lista de mensajes para cada flor (se define en JS abajo)
  */

  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital@0;1&display=swap');

  :root {
    --verde-oscuro: #2d5016;
    --verde-medio: #4a7c25;
    --verde-claro: #6fa832;
    --tronco: #5c3d1e;
    --tronco-oscuro: #3d2710;
    --amarillo: #f5c518;
    --amarillo-oscuro: #d4a017;
    --amarillo-claro: #fde97a;
    --fondo: #0d1f05;
    --tierra: #3b2206;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: radial-gradient(ellipse at top, #1a3a08 0%, #0d1f05 60%, #050e02 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    font-family: 'Lora', serif;
    overflow: hidden;
    position: relative;
    cursor: default;
  }

  /* Estrellas de fondo */
  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur, 3s) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; }
    50% { opacity: var(--op, 0.6); }
  }

  /* Escena */
  #escena {
    position: relative;
    width: 500px;
    height: 90vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    z-index: 1;
  }

  /* Tierra */
  .tierra {
    width: 100%;
    height: 60px;
    background: linear-gradient(180deg, #4a2d0a 0%, #2e1a06 100%);
    border-radius: 50% 50% 0 0 / 20px 20px 0 0;
    position: relative;
    z-index: 2;
  }
  .tierra::before {
    content: '';
    position: absolute;
    top: -8px; left: 10%; width: 80%; height: 16px;
    background: #5c3a0e;
    border-radius: 50%;
  }

  /* Árbol SVG */
  #arbol-container {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    cursor: pointer;
    z-index: 3;
    filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
    transition: filter 0.2s;
  }
  #arbol-container:hover {
    filter: drop-shadow(0 10px 40px rgba(245,197,24,0.3));
  }
  #arbol-container:active {
    transform: translateX(-50%) scale(0.98);
  }

  /* Flores que caen */
  .flor-cayendo {
    position: absolute;
    z-index: 10;
    pointer-events: none;
  }
  .flor-cayendo.aterrizada {
    pointer-events: all;
    cursor: pointer;
  }
  .flor-cayendo.aterrizada:hover .petalo {
    filter: brightness(1.3);
  }

  /* SVG flor */
  .flor-svg {
    width: 36px;
    height: 36px;
    display: block;
    transition: transform 0.2s;
  }
  .flor-cayendo.aterrizada:hover .flor-svg {
    transform: scale(1.3);
  }

  /* Globo de texto */
  .globo {
    position: absolute;
    transform: translateX(-50%) scale(0);
    transform-origin: center bottom;
    background: linear-gradient(135deg, #fffbe6, #fff8cc);
    border: 2px solid var(--amarillo-oscuro);
    border-radius: 16px;
    padding: 10px 14px;
    min-width: 140px;
    max-width: 200px;
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    color: #3d2710;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.8);
    pointer-events: none;
    z-index: 20;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: pre-wrap;
    line-height: 1.4;
  }
  .globo.visible {
    transform: translateX(-50%) scale(1);
  }
  .globo::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 8px solid transparent;
    border-top-color: var(--amarillo-oscuro);
  }
  .globo::before {
    content: '';
    position: absolute;
    top: calc(100% - 2px);
    left: 50%;
    transform: translateX(-50%);
    border: 7px solid transparent;
    border-top-color: #fffbe6;
    z-index: 1;
  }

  /* Contador */
  #contador {
    position: fixed;
    top: 20px;
    right: 20px;
    color: var(--amarillo);
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    background: rgba(0,0,0,0.4);
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid rgba(245,197,24,0.3);
    z-index: 100;
    letter-spacing: 0.05em;
  }

  /* Hint */
  #hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(245,197,24,0.6);
    font-family: 'Lora', serif;
    font-size: 13px;
    font-style: italic;
    letter-spacing: 0.08em;
    z-index: 100;
    pointer-events: none;
    animation: fadeHint 4s ease-in-out infinite;
  }
  @keyframes fadeHint {
    0%, 100% { opacity: 0; }
    30%, 70% { opacity: 1; }
  }

  /* Partículas al aterrizar */
  .particula {
    position: absolute;
    width: 6px; height: 6px;
    background: var(--amarillo);
    border-radius: 50%;
    pointer-events: none;
    z-index: 15;
    animation: particularizar 0.6s ease-out forwards;
  }
  @keyframes particularizar {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--px), var(--py)) scale(0); opacity: 0; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div id="contador">🌼 <span id="flores-restantes">0</span> flores restantes</div>
<div id="hint">✦ Toca el árbol para que caiga una flor ✦</div>

<div id="escena">
  <div id="arbol-container" onclick="soltarFlor()">

      <!-- Copa - capas de hojas verdes -->

      <ellipse cx="160" cy="100" rx="95" ry="85" fill="#4a7c25"/>
      <ellipse cx="120" cy="120" rx="70" ry="60" fill="#5a8e2e" opacity="0.8"/>

      <!-- Flores amarillas en el árbol (decorativas) -->
      <!-- flor 1 -->
      <g transform="translate(100,75)">

      <g transform="translate(50,155)">
        <circle cx="0" cy="-8" r="4" fill="#f5c518" opacity="0.85"/>

      <g transform="translate(270,150)">

  </div>

<script>
/* ============================================================
   ✏️  CONFIGURACIÓN — MODIFICA AQUÍ
   ============================================================ */

const MAX_FLORES = 7;  // Cantidad máxima de flores que pueden caer

const MENSAJES = [
  "🌼 ¡Te quiero mucho!",
  "✨ Cada día contigo\nes especial",
  "🌸 Eres increíble",
  "💛 Gracias por\nestar aquí",
  "🌟 Nunca te olvido",
  "🍀 Buena suerte hoy",
  "🌻 Eres mi sol",
];
// Puedes añadir o quitar mensajes. Si hay más flores que mensajes,
// los mensajes se reutilizan en ciclo.

/* ============================================================
   FIN DE CONFIGURACIÓN
   ============================================================ */

let floresCaidas = 0;
let globoActivo = null;

// Registro de posiciones finales de flores aterrizada
const posicionesOcupadas = [];
const FLOR_RADIO = 48;

function encontrarPosicionLibre(escenaWidth, baseY) {
  const margen = 40;
  const zonaAncho = escenaWidth - margen * 2;

  if (posicionesOcupadas.length === 0) {
    return { x: margen + Math.random() * zonaAncho, y: baseY };
  }

  // Muestrear 400 candidatos y elegir el más alejado en X de todas las flores
  let mejorX = margen + Math.random() * zonaAncho;
  let mejorDistMin = -1;

  for (let i = 0; i < 400; i++) {
    const cx = margen + Math.random() * zonaAncho;
    let distMin = Infinity;
    for (const pos of posicionesOcupadas) {
      const d = Math.abs(cx - pos.x);
      if (d < distMin) distMin = d;
    }
    if (distMin > mejorDistMin) {
      mejorDistMin = distMin;
      mejorX = cx;
    }
  }

  // Siempre el mismo Y — nunca flota
  return { x: mejorX, y: baseY };
}

// Actualizar contador
function actualizarContador() {
  document.getElementById('flores-restantes').textContent = MAX_FLORES - floresCaidas;
}
actualizarContador();

// Crear estrellas
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.cssText = `
    left:${Math.random()*100}%;
    top:${Math.random()*70}%;
    width:${Math.random()*2+1}px;
    height:${Math.random()*2+1}px;
    --dur:${(Math.random()*3+2).toFixed(1)}s;
    --op:${(Math.random()*0.5+0.2).toFixed(2)};
    animation-delay:${(Math.random()*5).toFixed(1)}s;
  `;
  starsEl.appendChild(s);
}

function soltarFlor() {
  if (floresCaidas >= MAX_FLORES) {
    // Sacudir el árbol
    const arbol = document.getElementById('arbol-container');
    arbol.style.animation = 'none';
    arbol.style.transform = 'translateX(-50%) rotate(-2deg)';
    setTimeout(() => arbol.style.transform = 'translateX(-50%) rotate(2deg)', 80);
    setTimeout(() => arbol.style.transform = 'translateX(-50%) rotate(-1deg)', 160);
    setTimeout(() => arbol.style.transform = 'translateX(-50%)', 240);
    return;
  }

  floresCaidas++;
  actualizarContador();

  const mensaje = MENSAJES[(floresCaidas - 1) % MENSAJES.length];

  // Posición de inicio aleatoria dentro de la copa
  const startX = 120 + Math.random() * 200; // dentro de la copa
  const startY = 60 + Math.random() * 160;

  const escena = document.getElementById('escena');
  const escenaRect = escena.getBoundingClientRect();

  // Destino en el suelo — sin solapamiento
  const baseY = escena.offsetHeight - 85;
  const posLibre = encontrarPosicionLibre(escena.offsetWidth, baseY);
  const destX = posLibre.x;
  const destY = posLibre.y;

  // Reservar la posición AHORA para que la siguiente flor no elija el mismo sitio
  posicionesOcupadas.push({ x: destX, y: destY });

  const dx = destX - (startX + 160 - 250); // compensar offset del árbol
  const ajusteX = (160 - 250); // left offset del árbol

  const florEl = document.createElement('div');
  florEl.className = 'flor-cayendo';

  // Calcular posición absoluta respecto a escena
  const arbolLeft = escena.offsetWidth / 2 - 160; // árbol centrado, 320/2=160
  const posX = arbolLeft + startX;
  const posY = startY + (escena.offsetHeight - 480 - 50); // ajuste por bottom del árbol

  const finalX = destX - posX;
  const finalY = destY - posY;

  const duracionMs = 1800 + Math.random() * 800;
  const rotVel = (Math.random() > 0.5 ? 1 : -1) * (60 + Math.random() * 80); // grados/segundo
  const rotFinal = rotVel * (duracionMs / 1000);

  florEl.style.cssText = `left: ${posX}px; top: ${posY}px;`;

  florEl.innerHTML = `
    <svg class="flor-svg" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
      <circle class="petalo" cx="18" cy="8" r="6" fill="#f5c518"/>
      <circle class="petalo" cx="27.6" cy="12.8" r="6" fill="#f5c518"/>
      <circle class="petalo" cx="27.6" cy="23.2" r="6" fill="#f5c518"/>
      <circle class="petalo" cx="18" cy="28" r="6" fill="#f5c518"/>
      <circle class="petalo" cx="8.4" cy="23.2" r="6" fill="#f5c518"/>
      <circle class="petalo" cx="8.4" cy="12.8" r="6" fill="#f5c518"/>
      <circle cx="18" cy="18" r="6" fill="#fde97a"/>
    </svg>
  `;

  escena.appendChild(florEl);

  // Sacudir árbol levemente
  const arbol = document.getElementById('arbol-container');
  arbol.style.transform = 'translateX(-50%) rotate(1.5deg)';
  setTimeout(() => arbol.style.transform = 'translateX(-50%) rotate(-1deg)', 100);
  setTimeout(() => arbol.style.transform = 'translateX(-50%)', 200);

  // Animación con rAF — caída recta con giro continuo
  const startTime = performance.now();

  function animar(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duracionMs, 1);
    const tEase = t * t; // ease-in (gravedad)

    const cx = finalX * t;
    const cy = finalY * tEase;
    const rot = rotVel * (elapsed / 1000);
    const scale = 1 - 0.2 * t;

    florEl.style.transform = `translate(${cx}px, ${cy}px) rotate(${rot}deg) scale(${scale})`;

    if (t < 1) {
      requestAnimationFrame(animar);
    } else {
      florEl.style.transform = `translate(${finalX}px, ${finalY}px) rotate(${rotFinal}deg) scale(0.8)`;
      florEl.classList.add('aterrizada');

      // Partículas
      for (let i = 0; i < 6; i++) {
        const p = document.createElement('div');
        p.className = 'particula';
        const ang = (i / 6) * Math.PI * 2;
        const dist = 20 + Math.random() * 20;
        p.style.cssText = `
          left: ${posX + finalX + 15}px;
          top: ${posY + finalY + 15}px;
          --px: ${Math.cos(ang)*dist}px;
          --py: ${Math.sin(ang)*dist}px;
          background: ${Math.random() > 0.5 ? '#f5c518' : '#fde97a'};
        `;
        escena.appendChild(p);
        setTimeout(() => p.remove(), 600);
      }

      // Click en la flor aterrizada
      florEl.addEventListener('click', (e) => {
        e.stopPropagation();

        // Cerrar globo activo
        if (globoActivo) {
          const anterior = globoActivo;
          globoActivo = null;
          anterior.classList.remove('visible');
          setTimeout(() => anterior.remove(), 300);
          // Si era esta misma flor, solo cerrar
          if (anterior._flor === florEl) return;
        }

        // Crear globo posicionado usando el SVG real (no el contenedor que tiene transform)
        const globo = document.createElement('div');
        globo.className = 'globo';
        globo.textContent = mensaje;
        globo._flor = florEl;

        const svgEl = florEl.querySelector('svg');
        const svgRect = svgEl.getBoundingClientRect();
        const escenaEl = document.getElementById('escena');
        const escenaRect = escenaEl.getBoundingClientRect();

        // Centro X de la flor, Y superior de la flor — ambos relativos a la escena
        const cx = svgRect.left + svgRect.width / 2 - escenaRect.left;
        const cy = svgRect.top - escenaRect.top - 10;

        globo.style.left = `${cx}px`;
        globo.style.top = `${cy}px`;

        escenaEl.appendChild(globo);
        // Doble rAF para que el browser procese el primer estado antes de animar
        // Ahora que el globo está en el DOM podemos leer su altura y subir encima de la flor
        requestAnimationFrame(() => {
          const globoH = globo.offsetHeight;
          globo.style.top = `${cy - globoH}px`;
          requestAnimationFrame(() => globo.classList.add('visible'));
        });

        globoActivo = globo;
      });
    }
  }

  requestAnimationFrame(animar);
}

// Cerrar globos al hacer click en el fondo
document.addEventListener('click', (e) => {
  if (!e.target.closest('.flor-cayendo') && globoActivo) {
    globoActivo.classList.remove('visible');
    const g = globoActivo;
    setTimeout(() => g.remove(), 300);
    globoActivo = null;
  }
});
